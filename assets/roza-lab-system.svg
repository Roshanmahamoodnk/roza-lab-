<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Rozalab system map</title>
  <desc id="desc">A premium flow diagram showing how the Carino brief moves through pairing, bench testing, process, and launch.</desc>
  <defs>
    <linearGradient id="panel" x1="190" y1="60" x2="1410" y2="920" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFDF9"/>
      <stop offset="1" stop-color="#F6EBDD"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F9F3EB"/>
    </linearGradient>
    <linearGradient id="accent" x1="260" y1="100" x2="1340" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C08A56"/>
      <stop offset="1" stop-color="#E2C26A"/>
    </linearGradient>
    <linearGradient id="rose" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#B85C73"/>
      <stop offset="1" stop-color="#E3A4B7"/>
    </linearGradient>
    <linearGradient id="sage" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2D766D"/>
      <stop offset="1" stop-color="#94C5BA"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#281B13" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L12 6L0 12Z" fill="#A06E46"/>
    </marker>
  </defs>

  <rect width="1600" height="1000" rx="48" fill="url(#panel)"/>
  <g opacity="0.5">
    <circle cx="212" cy="178" r="122" fill="#E2C194" opacity="0.6"/>
    <circle cx="1368" cy="144" r="134" fill="#E4B5C0" opacity="0.56"/>
    <circle cx="1296" cy="840" r="156" fill="#A9D2C9" opacity="0.58"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="98" y="86" width="1404" height="828" rx="42" fill="rgba(255,255,255,0.62)" stroke="#E6D6C3"/>
  </g>

  <g transform="translate(116 114)">
    <rect x="0" y="0" width="1368" height="52" rx="26" fill="#FFF8EF" stroke="#E8D8C5"/>
    <text x="30" y="34" font-family="Inter, Arial, sans-serif" font-size="18" letter-spacing="0.28em" fill="#A16B46">ROZALAB × CARINO SYSTEM MAP</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="126" y="214" width="300" height="186" rx="30" fill="url(#card)" stroke="#E8D8C5"/>
    <rect x="126" y="430" width="300" height="186" rx="30" fill="url(#card)" stroke="#E8D8C5"/>
    <rect x="126" y="646" width="300" height="186" rx="30" fill="url(#card)" stroke="#E8D8C5"/>

    <rect x="530" y="182" width="540" height="252" rx="36" fill="url(#card)" stroke="#E8D8C5"/>
    <rect x="530" y="478" width="540" height="252" rx="36" fill="url(#card)" stroke="#E8D8C5"/>
    <rect x="1110" y="260" width="280" height="380" rx="34" fill="url(#card)" stroke="#E8D8C5"/>
  </g>

  <g>
    <text x="160" y="270" font-family="Fraunces, Georgia, serif" font-size="30" font-weight="600" fill="#19120E">Brief</text>
    <text x="160" y="308" font-family="Inter, Arial, sans-serif" font-size="18" fill="#6B5C51">Carino gives the ambition.</text>
    <text x="160" y="336" font-family="Inter, Arial, sans-serif" font-size="18" fill="#6B5C51">Rozalab turns it into a system.</text>

    <text x="160" y="486" font-family="Fraunces, Georgia, serif" font-size="30" font-weight="600" fill="#19120E">Pairing</text>
    <text x="160" y="524" font-family="Inter, Arial, sans-serif" font-size="18" fill="#6B5C51">Floral, tropical, roasted, dessert.</text>
    <text x="160" y="552" font-family="Inter, Arial, sans-serif" font-size="18" fill="#6B5C51">A shortlist, not a random menu.</text>

    <text x="160" y="702" font-family="Fraunces, Georgia, serif" font-size="30" font-weight="600" fill="#19120E">Bench</text>
    <text x="160" y="740" font-family="Inter, Arial, sans-serif" font-size="18" fill="#6B5C51">Texture, stability, sweetness, aroma.</text>
    <text x="160" y="768" font-family="Inter, Arial, sans-serif" font-size="18" fill="#6B5C51">Each sample earns its place.</text>

    <text x="564" y="238" font-family="Fraunces, Georgia, serif" font-size="36" font-weight="600" fill="#19120E">Sample logic</text>
    <text x="564" y="274" font-family="Inter, Arial, sans-serif" font-size="18" fill="#6B5C51">Yuzu Cloud Cheesecake · Lychee Rose Signal · Saffron Pistachio Prime</text>
    <text x="564" y="304" font-family="Inter, Arial, sans-serif" font-size="18" fill="#6B5C51">Each SKU gets a name, a method, and a service format.</text>

    <text x="564" y="534" font-family="Fraunces, Georgia, serif" font-size="36" font-weight="600" fill="#19120E">Process control</text>
    <text x="564" y="570" font-family="Inter, Arial, sans-serif" font-size="18" fill="#6B5C51">Sanitise, weigh, pasteurise, age, churn, harden.</text>
    <text x="564" y="600" font-family="Inter, Arial, sans-serif" font-size="18" fill="#6B5C51">CCPs keep the product repeatable.</text>

    <text x="1148" y="322" font-family="Fraunces, Georgia, serif" font-size="32" font-weight="600" fill="#19120E">Launch</text>
    <text x="1148" y="360" font-family="Inter, Arial, sans-serif" font-size="18" fill="#6B5C51">Menu width, price band, service rule.</text>
    <text x="1148" y="392" font-family="Inter, Arial, sans-serif" font-size="18" fill="#6B5C51">Ready for client review.</text>

    <text x="1148" y="472" font-family="Fraunces, Georgia, serif" font-size="32" font-weight="600" fill="#19120E">Scale</text>
    <text x="1148" y="510" font-family="Inter, Arial, sans-serif" font-size="18" fill="#6B5C51">Pilot → partner line → QSR.</text>
    <text x="1148" y="542" font-family="Inter, Arial, sans-serif" font-size="18" fill="#6B5C51">System first, then volume.</text>

    <rect x="1112" y="664" width="252" height="116" rx="26" fill="#FFF8EF" stroke="#E8D8C5"/>
    <text x="1140" y="712" font-family="Inter, Arial, sans-serif" font-size="17" letter-spacing="0.24em" fill="#A16B46">OUTPUT</text>
    <text x="1140" y="742" font-family="Fraunces, Georgia, serif" font-size="28" font-weight="600" fill="#19120E">A premium ice cream brand story</text>
  </g>

  <g>
    <path d="M426 306H530" stroke="url(#accent)" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M426 522H530" stroke="url(#accent)" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M426 738H530" stroke="url(#accent)" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M1070 300H1110" stroke="url(#accent)" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M1070 598H1110" stroke="url(#accent)" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M830 434V478" stroke="url(#accent)" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M830 736V804" stroke="url(#accent)" stroke-width="4" marker-end="url(#arrow)"/>
  </g>

  <g opacity="0.96">
    <rect x="580" y="332" width="150" height="28" rx="14" fill="#F3E0C7"/>
    <rect x="744" y="332" width="140" height="28" rx="14" fill="#E8D3BD"/>
    <rect x="898" y="332" width="122" height="28" rx="14" fill="#D7C2AE"/>

    <circle cx="618" cy="612" r="34" fill="url(#rose)"/>
    <circle cx="710" cy="612" r="34" fill="url(#sage)"/>
    <circle cx="802" cy="612" r="34" fill="url(#accent)"/>
    <circle cx="894" cy="612" r="34" fill="#D8A95F"/>
  </g>

  <g opacity="0.38">
    <path d="M228 170H1370" stroke="#D7C4AF" stroke-width="1.4" stroke-dasharray="6 10"/>
    <path d="M228 846H1370" stroke="#D7C4AF" stroke-width="1.4" stroke-dasharray="6 10"/>
  </g>
</svg>
