<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Roza Lab R&D editorial gelato illustration</title>
  <desc id="desc">A light, editorial gelato scene with warm cream background, clean framing, and premium dessert forms.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbf7f0"/>
      <stop offset="100%" stop-color="#f0e6d6"/>
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#f6efe5" stop-opacity="0.88"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1a18"/>
      <stop offset="100%" stop-color="#3a312a"/>
    </linearGradient>
    <linearGradient id="rose" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e9b6c1"/>
      <stop offset="100%" stop-color="#cb8090"/>
    </linearGradient>
    <linearGradient id="pistachio" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d6e0bd"/>
      <stop offset="100%" stop-color="#9eb46c"/>
    </linearGradient>
    <linearGradient id="yuzu" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6e7a0"/>
      <stop offset="100%" stop-color="#d5b84a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#3d2d1b" flood-opacity="0.15"/>
    </filter>
    <filter id="blur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="250" cy="170" r="190" fill="#d8b183" opacity="0.12" filter="url(#blur)"/>
  <circle cx="1310" cy="160" r="240" fill="#d7c0a0" opacity="0.14" filter="url(#blur)"/>
  <circle cx="1300" cy="760" r="220" fill="#c67a8b" opacity="0.1" filter="url(#blur)"/>

  <g filter="url(#shadow)">
    <rect x="152" y="132" width="1296" height="636" rx="34" fill="url(#frame)" stroke="#1c1a18" stroke-opacity="0.08"/>
    <rect x="204" y="184" width="420" height="540" rx="28" fill="#ffffff" stroke="#1c1a18" stroke-opacity="0.06"/>
    <rect x="660" y="160" width="320" height="588" rx="28" fill="#f8f3eb" stroke="#1c1a18" stroke-opacity="0.06"/>
    <rect x="1024" y="184" width="320" height="540" rx="28" fill="#ffffff" stroke="#1c1a18" stroke-opacity="0.06"/>
  </g>

  <g>
    <text x="238" y="236" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" fill="#9b6c3d" letter-spacing="0.22em">ROZA LAB R&amp;D</text>
    <text x="238" y="298" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="62" font-weight="800" fill="url(#ink)">the taste</text>
    <text x="238" y="358" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="62" font-weight="800" fill="url(#ink)">of making it</text>
    <text x="238" y="422" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="26" fill="#5f5347">premium gelato, modern cafe mood</text>

    <rect x="238" y="526" width="248" height="58" rx="18" fill="#fffdf8" stroke="#1c1a18" stroke-opacity="0.08"/>
    <text x="362" y="562" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="700" fill="#1c1a18">Since 2026 in Bangalore</text>

    <rect x="238" y="612" width="248" height="82" rx="18" fill="#fffdf8" stroke="#1c1a18" stroke-opacity="0.08"/>
    <text x="260" y="642" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" fill="#7d7469">Signature direction</text>
    <text x="260" y="670" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" fill="#1c1a18" font-weight="600">Yuzu · Lychee · Saffron · Espresso</text>
  </g>

  <g transform="translate(700 210)">
    <rect x="0" y="0" width="220" height="120" rx="28" fill="#ffffff" stroke="#1c1a18" stroke-opacity="0.08"/>
    <text x="26" y="42" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" fill="#9b6c3d" letter-spacing="0.18em">FLAVOR STUDY</text>
    <text x="26" y="78" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="28" fill="#1c1a18" font-weight="700">Balance + texture</text>

    <ellipse cx="192" cy="188" rx="112" ry="58" fill="#e4dac7" opacity="0.6"/>
    <circle cx="152" cy="210" r="120" fill="url(#yuzu)"/>
    <circle cx="250" cy="172" r="88" fill="url(#rose)"/>
    <circle cx="112" cy="114" r="92" fill="url(#pistachio)"/>

    <circle cx="106" cy="110" r="10" fill="#fff7e4"/>
    <circle cx="242" cy="166" r="10" fill="#fff7e4"/>
    <circle cx="176" cy="232" r="8" fill="#fff7e4"/>

    <path d="M90 318c0-26 20-46 46-46h110c26 0 46 20 46 46v18H90v-18z" fill="#2e2a25"/>
    <path d="M112 336h168c0 54-36 88-84 88s-84-34-84-88z" fill="#1c1a18"/>
    <path d="M118 342h156c0 40-33 66-78 66s-78-26-78-66z" fill="#f7f0dc"/>
    <path d="M120 364c44 24 98 28 148 12" fill="none" stroke="#9b6c3d" stroke-opacity="0.24" stroke-width="3" stroke-linecap="round"/>
  </g>

  <g transform="translate(1054 220)">
    <text x="0" y="0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22" fill="#9b6c3d" letter-spacing="0.16em">EDITION</text>
    <rect x="0" y="28" width="214" height="12" rx="6" fill="#ece4d7"/>
    <rect x="0" y="28" width="160" height="12" rx="6" fill="#1c1a18" opacity="0.85"/>

    <g transform="translate(0 84)">
      <rect x="0" y="0" width="238" height="112" rx="24" fill="#fbf7f0" stroke="#1c1a18" stroke-opacity="0.08"/>
      <text x="18" y="36" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" fill="#1c1a18" font-weight="700">Pairings that work</text>
      <text x="18" y="66" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" fill="#5f5347">Lychee + rosewater</text>
      <text x="18" y="92" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" fill="#5f5347">Saffron + pistachio</text>
    </g>

    <g transform="translate(0 238)">
      <rect x="0" y="0" width="238" height="112" rx="24" fill="#fbf7f0" stroke="#1c1a18" stroke-opacity="0.08"/>
      <text x="18" y="36" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" fill="#1c1a18" font-weight="700">Price ladder</text>
      <text x="18" y="66" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" fill="#5f5347">Scoops · shakes · sundaes</text>
      <text x="18" y="92" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" fill="#5f5347">Premium but buyable</text>
    </g>
  </g>
</svg>
