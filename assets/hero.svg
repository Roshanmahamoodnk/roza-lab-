<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Roza Lab R&amp;D hero illustration</title>
  <desc id="desc">A premium abstract laboratory illustration with glowing panels, floating spheres, and a dessert-style centerpiece.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#120d24"/>
      <stop offset="55%" stop-color="#1a1530"/>
      <stop offset="100%" stop-color="#090712"/>
    </linearGradient>
    <linearGradient id="pinkGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffb1c3" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#f25c96" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="goldGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6d58a"/>
      <stop offset="100%" stop-color="#c99a34"/>
    </linearGradient>
    <linearGradient id="mintGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#baf6ee"/>
      <stop offset="100%" stop-color="#72d1cb"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.75"/>

  <circle cx="320" cy="160" r="180" fill="#f59eb0" opacity="0.10"/>
  <circle cx="1350" cy="130" r="220" fill="#8dd9d4" opacity="0.10"/>
  <circle cx="1340" cy="780" r="240" fill="#d8b35d" opacity="0.08"/>

  <g opacity="0.92" filter="url(#shadow)">
    <rect x="180" y="140" rx="34" ry="34" width="1240" height="620" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.12"/>
    <rect x="220" y="180" rx="26" ry="26" width="320" height="540" fill="#121020" fill-opacity="0.88" stroke="#ffffff" stroke-opacity="0.08"/>
    <rect x="580" y="180" rx="26" ry="26" width="420" height="540" fill="#181526" fill-opacity="0.84" stroke="#ffffff" stroke-opacity="0.08"/>
    <rect x="1040" y="180" rx="26" ry="26" width="340" height="540" fill="#121020" fill-opacity="0.88" stroke="#ffffff" stroke-opacity="0.08"/>
  </g>

  <g>
    <rect x="260" y="250" rx="20" ry="20" width="160" height="56" fill="#f59eb0" fill-opacity="0.15" stroke="#f59eb0" stroke-opacity="0.65"/>
    <text x="340" y="286" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22" fill="#ffd7e1" font-weight="700">Roza Lab</text>

    <text x="260" y="360" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="48" fill="#f7f1ea" font-weight="800">R&amp;D</text>
    <text x="260" y="412" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="24" fill="#d4ccdb">Project One</text>
    <text x="260" y="448" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="24" fill="#d4ccdb">Carino Study</text>

    <rect x="260" y="520" rx="18" ry="18" width="220" height="56" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.1"/>
    <text x="370" y="555" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" fill="#f6d58a" font-weight="700">Premium dessert lab</text>
  </g>

  <g transform="translate(640 240)">
    <circle cx="150" cy="132" r="118" fill="#f59eb0" opacity="0.14"/>
    <circle cx="236" cy="108" r="72" fill="#8dd9d4" opacity="0.14"/>
    <circle cx="92" cy="220" r="86" fill="#d8b35d" opacity="0.12"/>

    <rect x="38" y="70" width="320" height="260" rx="30" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.1"/>
    <path d="M108 116h186c17 0 30 14 30 30v72c0 17-13 30-30 30H108c-17 0-30-13-30-30v-72c0-16 13-30 30-30z" fill="#0c0a16" fill-opacity="0.55"/>

    <path d="M120 180c24-58 88-82 147-68 26 6 50 19 70 40 11 12 19 26 24 42 9 29 5 61-11 86-15 24-40 39-70 47-39 10-82 5-118-13-22-11-40-27-51-47-12-22-13-46-2-72z" fill="url(#pinkGlow)" opacity="0.95"/>
    <path d="M148 202c22-39 65-59 106-51 16 3 31 11 43 23 7 7 12 17 15 27 5 18 4 39-5 55-9 17-24 28-45 34-29 8-61 5-88-8-17-8-29-20-36-35-7-14-8-30 0-45z" fill="#fff4f7" opacity="0.46"/>

    <circle cx="268" cy="126" r="10" fill="#fff6d1"/>
    <circle cx="232" cy="90" r="8" fill="#fff6d1"/>
    <circle cx="194" cy="134" r="6" fill="#fff6d1"/>
    <circle cx="286" cy="188" r="7" fill="#fff6d1"/>

    <path d="M114 304c0-18 14-32 32-32h128c18 0 32 14 32 32v16H114v-16z" fill="#272236"/>
    <path d="M132 320h176c0 56-40 90-88 90s-88-34-88-90z" fill="#191624"/>
    <path d="M134 330h172c0 44-39 72-86 72s-86-28-86-72z" fill="url(#goldGlow)"/>
    <rect x="114" y="320" width="216" height="18" rx="9" fill="#fff" fill-opacity="0.06"/>
  </g>

  <g transform="translate(1050 250)">
    <text x="0" y="0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22" fill="#dcd4e8" font-weight="700">Flavor science</text>
    <rect x="0" y="24" width="210" height="12" rx="6" fill="#ffffff" fill-opacity="0.08"/>
    <rect x="0" y="24" width="164" height="12" rx="6" fill="url(#mintGlow)"/>

    <g transform="translate(0 72)">
      <circle cx="26" cy="26" r="20" fill="#f59eb0" opacity="0.9"/>
      <circle cx="86" cy="26" r="20" fill="#8dd9d4" opacity="0.9"/>
      <circle cx="146" cy="26" r="20" fill="#d8b35d" opacity="0.9"/>
      <circle cx="206" cy="26" r="20" fill="#fff1b8" opacity="0.9"/>
    </g>

    <g transform="translate(0 170)" fill="#f2edf9" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18">
      <text x="0" y="0">Acid + fat</text>
      <text x="0" y="40">Sweet + umami</text>
      <text x="0" y="80">Aroma + cream</text>
      <text x="0" y="120">Bitter + sweet</text>
    </g>

    <g transform="translate(0 320)">
      <rect x="0" y="0" width="248" height="132" rx="24" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.08"/>
      <text x="22" y="36" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" fill="#f6d58a" font-weight="700">Visual finish</text>
      <text x="22" y="68" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" fill="#e8e1ef">Minimal garnish</text>
      <text x="22" y="96" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" fill="#e8e1ef">High contrast</text>
    </g>
  </g>

  <g opacity="0.88">
    <circle cx="1280" cy="760" r="18" fill="#f59eb0"/>
    <circle cx="1332" cy="720" r="10" fill="#8dd9d4"/>
    <circle cx="1390" cy="764" r="14" fill="#d8b35d"/>
    <circle cx="1448" cy="716" r="9" fill="#fff1b8"/>
  </g>
</svg>
